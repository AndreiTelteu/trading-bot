
services:
  app:
    build: .
    container_name: trading-backend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trading-backend.rule=Host(`trading.ryzen.cloud`)"
      - "traefik.http.routers.trading-backend.entrypoints=websecure"
      - "traefik.http.routers.trading-backend.tls=true"
      - "traefik.http.routers.trading-backend.tls.certresolver=cloudflare"
      - "traefik.http.services.trading-backend.loadbalancer.server.port=5001"
    volumes:
      - ./:/app
    networks:
      - proxy

networks:
  proxy:
    external: true
