
services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bootstrap:
    build: .
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
    command: ["-c", "go run ./cmd/bootstrap"]
    environment:
      DATABASE_URL_FILE: /run/secrets/runtime_database_url
      MIGRATION_DATABASE_URL_FILE: /run/secrets/migration_database_url
      LEDGER_DATABASE_URL_FILE: /run/secrets/ledger_database_url
      PARITY_DATABASE_URL_FILE: /run/secrets/parity_database_url
      BOOTSTRAP_RUNTIME_PASSWORD_FILE: /run/secrets/runtime_database_password
      BOOTSTRAP_LEDGER_PASSWORD_FILE: /run/secrets/ledger_database_password
      BOOTSTRAP_PARITY_PASSWORD_FILE: /run/secrets/parity_database_password
    secrets:
      - migration_database_url
      - runtime_database_url
      - ledger_database_url
      - parity_database_url
      - runtime_database_password
      - ledger_database_password
      - parity_database_password

  app:
    build: .
    container_name: trading-backend
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trading-backend.rule=Host(`trading.local`)"
      - "traefik.http.routers.trading-backend.entrypoints=websecure,web"
      - "traefik.http.routers.trading-backend.tls=true"
      - "traefik.http.services.trading-backend.loadbalancer.server.port=5001"
    volumes:
      - ./:/app
    environment:
      PORT: 5001
      DATABASE_URL_FILE: /run/secrets/runtime_database_url
      LEDGER_DATABASE_URL_FILE: /run/secrets/ledger_database_url
      PARITY_DATABASE_URL_FILE: /run/secrets/parity_database_url
      AUTH_USERNAME: ${AUTH_USERNAME:?AUTH_USERNAME must be set}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?AUTH_PASSWORD must be set}
      GOVERNANCE_ADMIN_USERS: ${GOVERNANCE_ADMIN_USERS:-}
      STAGE08_FLAG_SCHEMA_VERSION: ${STAGE08_FLAG_SCHEMA_VERSION:-stage08-flags-v1}
      STAGE08_LEDGER_AUTHORITY: ${STAGE08_LEDGER_AUTHORITY:-legacy}
      STAGE08_SHARED_ENGINE: ${STAGE08_SHARED_ENGINE:-off}
      STAGE08_NEW_BACKTEST: ${STAGE08_NEW_BACKTEST:-off}
      STAGE08_POINT_IN_TIME_UNIVERSE: ${STAGE08_POINT_IN_TIME_UNIVERSE:-off}
      STAGE08_CANDIDATE_STRATEGY: ${STAGE08_CANDIDATE_STRATEGY:-off}
      STAGE08_DUAL_RUN: ${STAGE08_DUAL_RUN:-off}
      STAGE08_STAGE07_CONTEXT: ${STAGE08_STAGE07_CONTEXT:-}
    secrets:
      - runtime_database_url
      - ledger_database_url
      - parity_database_url
    ports:
      - 5001:5001
    networks:
      - default
      - pub

  postgres-test:
    image: postgres:16-alpine
    container_name: trading-postgres-test
    restart: unless-stopped
    profiles: ["test"]
    environment:
      POSTGRES_DB: trading_bot_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_bot_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_test_data:

networks:
  pub:
    external: true

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:?set POSTGRES_PASSWORD_FILE to a local secret file}
  migration_database_url:
    file: ${MIGRATION_DATABASE_URL_FILE:?set MIGRATION_DATABASE_URL_FILE to a local secret file}
  runtime_database_password:
    file: ${RUNTIME_DATABASE_PASSWORD_FILE:?set RUNTIME_DATABASE_PASSWORD_FILE to a local secret file}
  ledger_database_password:
    file: ${LEDGER_DATABASE_PASSWORD_FILE:?set LEDGER_DATABASE_PASSWORD_FILE to a local secret file}
  parity_database_password:
    file: ${PARITY_DATABASE_PASSWORD_FILE:?set PARITY_DATABASE_PASSWORD_FILE to a local secret file}
  runtime_database_url:
    file: ${RUNTIME_DATABASE_URL_FILE:?set RUNTIME_DATABASE_URL_FILE to a local secret file}
  ledger_database_url:
    file: ${LEDGER_DATABASE_URL_FILE:?set LEDGER_DATABASE_URL_FILE to a local secret file}
  parity_database_url:
    file: ${PARITY_DATABASE_URL_FILE:?set PARITY_DATABASE_URL_FILE to a local secret file}
